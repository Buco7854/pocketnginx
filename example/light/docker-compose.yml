# Light image (nginx + the lightngx binary). Values come from .env; edit that,
# or replace any ${VAR:-default} below with a literal value to keep everything
# in this file. The full and hardened examples share this same layout.

services:
  nginx:
    image: ghcr.io/buco7854/lightngx:latest
    container_name: nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    ports:
      - "80:80"
      - "443:443"
      - "${UI_BIND:-127.0.0.1}:9000:9000"   # management UI (localhost only by default)
      # LAN access via the seeded conf.d/lightngx.conf proxy (:9001, HTTP,
      # private IPs only). Uncomment to publish it, and set LN_SECURE_COOKIES=false.
      # - "9001:9001"
    volumes:
      - "${NGINX_CONF_DIR:-./nginx/conf}:/etc/nginx"      # seeded if empty
      - "${NGINX_LOG_DIR:-./nginx/logs}:/var/log/nginx"
      - "${DATA_DIR:-./lightngx}:/var/lib/lightngx"       # keep this volume
    environment:
      - TZ=${TZ:-UTC}

      # ---- Security & sessions ----
      - LN_SECURE_COOKIES=${LN_SECURE_COOKIES:-true}
      - LN_SESSION_SECRET=${LN_SESSION_SECRET:-}
      - LN_SESSION_TTL=${LN_SESSION_TTL:-12h}
      - LN_TRUSTED_PROXIES=${LN_TRUSTED_PROXIES:-}
      - LN_MAX_EDIT_SIZE=${LN_MAX_EDIT_SIZE:-2097152}

      # ---- Features ----
      - LN_SITES=${LN_SITES:-true}
      - LN_STREAMS=${LN_STREAMS:-true}
      - LN_MAINTENANCE=${LN_MAINTENANCE:-true}
      - LN_MAINTENANCE_PAGE=${LN_MAINTENANCE_PAGE:-}
      - LN_LOGROTATE=${LN_LOGROTATE:-true}
      - LN_AUTO_RELOAD=${LN_AUTO_RELOAD:-true}
      - LN_LOG_PATHS=${LN_LOG_PATHS:-/var/log/nginx}

      # ---- Pre-seeded admin (optional) ----
      - LN_ADMIN_USER=${LN_ADMIN_USER:-}
      - LN_ADMIN_PASSWORD_HASH=${LN_ADMIN_PASSWORD_HASH:-}

      # ---- Two-factor / WebAuthn ----
      - LN_MFA_REQUIRED_ROLES=${LN_MFA_REQUIRED_ROLES-admin}
      - LN_WEBAUTHN_RPID=${LN_WEBAUTHN_RPID:-}
      - LN_WEBAUTHN_ORIGINS=${LN_WEBAUTHN_ORIGINS:-}

      # ---- OIDC (optional) ----
      - LN_OIDC_ISSUER=${LN_OIDC_ISSUER:-}
      - LN_OIDC_CLIENT_ID=${LN_OIDC_CLIENT_ID:-}
      - LN_OIDC_CLIENT_SECRET=${LN_OIDC_CLIENT_SECRET:-}
      - LN_OIDC_REDIRECT_URL=${LN_OIDC_REDIRECT_URL:-}
      - LN_OIDC_SCOPES=${LN_OIDC_SCOPES:-openid,profile,email}
      - LN_OIDC_GROUPS_CLAIM=${LN_OIDC_GROUPS_CLAIM:-groups}
      - LN_OIDC_ALLOWED_GROUPS=${LN_OIDC_ALLOWED_GROUPS:-}
      - LN_OIDC_ADMIN_GROUPS=${LN_OIDC_ADMIN_GROUPS:-}
      - LN_OIDC_LABEL=${LN_OIDC_LABEL:-}
      - LN_OIDC_AUTH_URL=${LN_OIDC_AUTH_URL:-}
      - LN_OIDC_TOKEN_URL=${LN_OIDC_TOKEN_URL:-}
      - LN_OIDC_JWKS_URL=${LN_OIDC_JWKS_URL:-}
      - LN_OIDC_USERINFO_URL=${LN_OIDC_USERINFO_URL:-}

      # ---- Container internals (image-managed; change only with the mounts) ----
      - LN_LISTEN=${LN_LISTEN:-:9000}
      - LN_SUPERVISE=${LN_SUPERVISE:-true}
      - LN_DATA_DIR=${LN_DATA_DIR:-/var/lib/lightngx}
      - LN_DB_PATH=${LN_DB_PATH:-}
      - LN_NGINX_BIN=${LN_NGINX_BIN:-nginx}
      - LN_NGINX_CONF=${LN_NGINX_CONF:-/etc/nginx/nginx.conf}
      - LN_NGINX_CONF_DIR=${LN_NGINX_CONF_DIR:-/etc/nginx}
      - LN_NGINX_PID=${LN_NGINX_PID:-/var/run/nginx.pid}
      - LN_FIX_CONFIG_PERMS=${LN_FIX_CONFIG_PERMS:-true}
      - LN_NGINX_USER=${LN_NGINX_USER:-}
      - LN_SITES_AVAILABLE_DIR=${LN_SITES_AVAILABLE_DIR:-}
      - LN_SITES_ENABLED_DIR=${LN_SITES_ENABLED_DIR:-}
      - LN_STREAMS_AVAILABLE_DIR=${LN_STREAMS_AVAILABLE_DIR:-}
      - LN_STREAMS_ENABLED_DIR=${LN_STREAMS_ENABLED_DIR:-}
