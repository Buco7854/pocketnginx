# Optional traffic-status dashboard (full image only; the VTS module is loaded
# but configures nothing until you add this). Copy it into your seeded config
# (nginx/conf/conf.d/) and uncomment the 9113 port bind in the compose to reach
# the page at http://127.0.0.1:9113/status.
vhost_traffic_status_zone shared:vhost_traffic_status:32m;
vhost_traffic_status_filter_by_set_key $host host::$host;

server {
    listen 9113;

    # Keep it private. The compose binds the port to loopback; this allow list
    # is belt and braces for private networks.
    allow 127.0.0.0/8;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location /status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
    }
}
