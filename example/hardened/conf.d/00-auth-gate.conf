# http-context setup for the auth gates: the shared dictionaries they use.
# These names are unique, so this loads cleanly whether or not the CrowdSec
# bouncer is also running.
#
# The gate lua scripts are mounted onto nginx's default require path
# (/usr/local/share/lua/5.1), so no lua_package_path is needed here. That
# matters: CrowdSec's crowdsec_nginx.conf already sets lua_package_path,
# resolver and the lua_ssl_* directives, and nginx rejects a duplicate of any
# of them. If you run the gate WITHOUT CrowdSec, supply those directives with
# 01-gate-resolver.conf (see the .example next to this file).

# OIDC circuit-breaker flag + lua-resty-openidc discovery/JWKS caches.
lua_shared_dict oidc_health 1m;
lua_shared_dict discovery   1m;
lua_shared_dict jwks        1m;

# TOTP per-IP brute-force counter. 10^6 codes at 6 digits is small, so this
# is strongly recommended whenever the TOTP gate (or fallback) is in use.
lua_shared_dict totp_ratelimit 10m;
