# TOTP authentication gate. RFC 6238 6-digit code before requests reach your
# app, with an IP whitelist for bypass. See the hardened README for full setup.
#
# Requires /etc/nginx/gates/totp/{secret,cookie_key} readable by the nginx
# worker user (`chown nginx:nginx`). Without the totp_ratelimit dict in
# conf.d/00-auth-gate.conf brute-force protection is OFF.
#
# Do NOT also include snippets/oidc-gate.conf in the same server: nginx
# allows only one rewrite_by_lua_block per context.

rewrite_by_lua_block {
    local gate = require("totp_gate")
    gate.guard({
        -- Shared CIDR file (recommended). One source of truth for the
        -- "never gated" list across all gated vhosts. Sample at
        -- whitelist_ips.example. Optional per-snippet list below is
        -- appended.
        whitelist_ips_file = "/etc/nginx/gates/whitelist_ips",
        -- whitelist_ips    = { "192.168.99.0/24" },
        -- whitelist_paths  = { "^/health$", "^/.well%-known/" },
        -- session_ttl         = 8 * 3600,
        -- max_failures        = 10,
        -- failure_window      = 15 * 60,
        -- Optional custom login page; omit to use the baked-in one.
        -- login_template_file = "/etc/nginx/templates/totp-login.html",
        -- login_path          = "/__totp_login",
    })
}
