# OIDC authentication gate. Drop into any server{} to gate it behind your
# existing OIDC IdP. Requires the shared dicts in conf.d/00-auth-gate.conf.
# See the hardened README for full setup.
#
# Do NOT also include snippets/totp-gate.conf in the same server: nginx
# allows only one rewrite_by_lua_block per context.

rewrite_by_lua_block {
    local gate = require("oidc_gate")
    gate.guard({
        oidc = {
            -- Auto-discovery: pass a URL.
            -- Manual: pass a table { authorization_endpoint=…,
            -- token_endpoint=…, jwks_uri=…, issuer=… }.
            discovery     = "https://idp.example.com/.well-known/openid-configuration",
            client_id     = "nginx-gate",
            -- Path only: lua-resty-openidc builds the absolute URL from the
            -- request (scheme + Host), so there is no domain to hardcode here
            -- and it works for whatever host this vhost serves. Register the
            -- resulting https://<your-host>/__oidc_callback at your IdP.
            redirect_uri  = "/__oidc_callback",
            -- scope, ssl_verify, logout_path, use_pkce: see
            -- lua-resty-openidc opts.

            -- Persist ONLY the userinfo claims in the cookie. The
            -- default also stores the raw id_token + access_token +
            -- refresh_token, which pushes the cookie past 4 KB and
            -- triggers chunking (session= + session2= …). Some
            -- proxies (Cloudflare) drop chunks → the first request
            -- after login works, every subsequent one is redirected
            -- back to the IdP. We only need user claims here to set
            -- the X-Auth-* upstream headers, so toss the rest.
            session_contents = { user = true },
        },

        -- File on disk, chown nginx:nginx + 0600. Inline
        -- `oidc.client_secret = "…"` or `os.getenv()` (with
        -- `env FOO;` in nginx.conf) also work.
        client_secret_file = "/etc/nginx/gates/oidc/client_secret",

        -- REQUIRED with worker_processes > 1. lua-resty-session
        -- otherwise generates a per-worker random key, and the OIDC
        -- callback then fails with "no session state found" because
        -- worker A signed the cookie and worker B can't decrypt it.
        -- Generate once:
        --   head -c 32 /dev/urandom > gates/oidc/session_secret
        --   chmod 600 gates/oidc/session_secret
        --   docker compose exec nginx \
        --       chown nginx:nginx /etc/nginx/gates/oidc/session_secret
        session_secret_file = "/etc/nginx/gates/oidc/session_secret",

        -- Shared CIDR file (recommended). One source of truth.
        -- Auto-propagated to totp_fallback below (no need to repeat).
        -- Optional per-snippet list below is appended.
        whitelist_ips_file = "/etc/nginx/gates/whitelist_ips",
        -- whitelist_ips    = { "192.168.99.0/24" },
        -- whitelist_paths  = { "^/health$", "^/.well%-known/" },

        -- IdP-down failover. Omit to return 503 + Retry-After:30.
        -- Requires the TOTP keys to exist (see totp-gate.conf).
        -- Inherits whitelist_ips_file from above unless overridden.
        totp_fallback = {},

        -- Active health probe (worker 0, lazy-init on first request).
        -- Defaults to polling the discovery URL every 30 s.
        -- probe          = true,
        -- probe_interval = 30,    -- seconds
        -- probe_timeout  = 5,
        -- probe_url      = "...",
        -- fallback_ttl   = 30,    -- seconds the circuit stays open
        -- set_user_headers = true, -- X-Auth-{Sub,User,Email} → upstream
    })
}
