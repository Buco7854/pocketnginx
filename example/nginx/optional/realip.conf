# Optional drop-in: restore real client IPs behind Docker's
# bridge NAT or a host-side proxy. Trusting X-Forwarded-For from these
# ranges is a policy decision - review them before enabling; anything
# that can reach nginx from a trusted range can spoof its client IP.
real_ip_header X-Forwarded-For;
set_real_ip_from 127.0.0.1;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 10.0.0.0/8;
real_ip_recursive on;
