name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  schedule:
    # Weekly rebuild of :dev/:sha against the current nginx base image.
    # Release tags (:latest, :full, semver) are only rebuilt by pushing a
    # new version tag.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./... && go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/app/package-lock.json
      - run: npm ci && npm run build
        working-directory: web/app

  image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Light: nginx + the lightngx binary only. The lean default.
      # Stable pointers (latest/light + the semver precision tags) are cut
      # from version tags only; branch/schedule builds just push :sha.
      - uses: docker/metadata-action@v5
        id: meta-light
        with:
          images: ghcr.io/${{ github.repository_owner }}/lightngx
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=light,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: light
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-light.outputs.tags }}
          labels: ${{ steps.meta-light.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}-${{ github.sha }}

      # Full: light + CrowdSec bouncer, VTS and the auth-gate lua. The
      # :full tag is the full counterpart of :latest; semver tags get a
      # -full suffix. latest=false so full never claims :latest.
      - uses: docker/metadata-action@v5
        id: meta-full
        with:
          images: ghcr.io/${{ github.repository_owner }}/lightngx
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            type=semver,pattern={{major}},suffix=-full
            type=raw,value=full,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev-full,enable={{is_default_branch}}
            type=sha,suffix=-full
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: full
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-full.outputs.tags }}
          labels: ${{ steps.meta-full.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}-${{ github.sha }}
