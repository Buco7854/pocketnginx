# Example: reach the UI (127.0.0.1:9000) from the LAN over plain HTTP.
# Copy into conf.d and reload, then publish :9001 in the compose.

# Keep an outer proxy's X-Forwarded-Proto/Host if set, else derive them.
map $http_x_forwarded_proto $lngx_fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}
map $http_x_forwarded_host $lngx_fwd_host {
    default $http_x_forwarded_host;
    ''      $http_host;
}

server {
    listen 9001;

    # local networks only
    allow 127.0.0.0/8;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny  all;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $lngx_fwd_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $lngx_fwd_proto;
        proxy_buffering off;              # live log stream (SSE)
        proxy_read_timeout 1h;
    }
}
